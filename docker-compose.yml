
services:
  postgres:
    image: timescale/timescaledb:latest-pg16  
    container_name: base_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uni_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: base_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: uni_crypto_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

  ws-gateway:
    build:
      context: .
      dockerfile: apps/ws-gateway/Dockerfile
    container_name: ws-gateway
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "3002:3002"

  # IMPORTANT:
  # Không scale replicas cho cùng một market nếu chưa có distributed lock.
  # Mỗi market chỉ nên có đúng 1 matching engine active tại một thời điểm.
  matching-btc-usdt:
    build:
      context: .
      dockerfile: apps/matching-engine/Dockerfile
    container_name: matching-btc-usdt
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgresql://root:password@postgres:5432/uni_db
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: orders.exchange
      REDIS_URL: redis://redis:6379
      MATCHING_MARKET: BTC-USDT
      MATCHING_QUEUE: matching.BTC-USDT

  matching-eth-usdt:
    build:
      context: .
      dockerfile: apps/matching-engine/Dockerfile
    container_name: matching-eth-usdt
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgresql://root:password@postgres:5432/uni_db
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: orders.exchange
      REDIS_URL: redis://redis:6379
      MATCHING_MARKET: ETH-USDT
      MATCHING_QUEUE: matching.ETH-USDT

  matching-bnb-usdt:
    build:
      context: .
      dockerfile: apps/matching-engine/Dockerfile
    container_name: matching-bnb-usdt
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgresql://root:password@postgres:5432/uni_db
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: orders.exchange
      REDIS_URL: redis://redis:6379
      MATCHING_MARKET: BNB-USDT
      MATCHING_QUEUE: matching.BNB-USDT

  outbox-worker:
    build:
      context: .
      dockerfile: apps/outbox-worker/Dockerfile
    container_name: outbox-worker
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgresql://root:password@postgres:5432/uni_db
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_EXCHANGE: orders.exchange

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        API_URL: http://api:8080
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: uni-admin
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      API_URL: http://api:8080
    ports:
      - "3000:3000"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        API_URL: http://api:8080
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: uni-client
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      API_URL: http://api:8080
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  redis_data:

